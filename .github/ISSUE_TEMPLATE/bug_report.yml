name: Bug report
description: Report a reproducible problem in MCP Network Analyzer
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please include reproducible details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and inputs
      placeholder: |
        1. Run ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: netcap --version output
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, shell
      placeholder: macOS 14, Node 22.19.0, pnpm 10.x, zsh
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
    validations:
      required: false
